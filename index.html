<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>T4emo — Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0d;
        --bg-elev: #13131a;
        --bg-sunk: #06060a;
        --text: #f1f1f3;
        --text-muted: #8b8b95;
        --border: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(255, 255, 255, 0.35);
        --accent: #5ea0ff;
        --accent-glow: rgba(94, 160, 255, 0.45);
        --accent-ink: #06060a;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Space Grotesk",
          -apple-system,
          system-ui,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        transition:
          background 0.3s ease,
          color 0.3s ease;
        height: 100vh;
        overflow: hidden;
      }
      main {
        height: calc(100vh - 64px);
        overflow: hidden;
        position: relative;
      }
      main > section {
        min-height: 100% !important;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding-top: 40px !important;
        padding-bottom: 40px !important;
      }
      main > section::-webkit-scrollbar {
        width: 0;
      }
      /* page indicator dots */
      .page-dots {
        position: fixed;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 14px;
        z-index: 40;
      }
      .page-dot {
        width: 28px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        cursor: pointer;
        background: transparent;
        border: none;
        padding: 0;
        color: var(--text-muted);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 1.5px;
        gap: 8px;
        transition:
          color 0.2s,
          gap 0.25s;
      }
      .page-dot::after {
        content: "";
        display: block;
        width: 18px;
        height: 1px;
        background: currentColor;
        transition:
          width 0.25s,
          background 0.25s,
          box-shadow 0.25s;
      }
      .page-dot.active {
        color: var(--text);
      }
      .page-dot.active::after {
        width: 28px;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent-glow);
      }
      .page-dot:hover {
        color: var(--text);
      }
      .page-dot .label {
        opacity: 0;
        transform: translateX(8px);
        transition:
          opacity 0.25s,
          transform 0.25s;
        white-space: nowrap;
      }
      .page-dot:hover .label,
      .page-dot.active .label {
        opacity: 1;
        transform: translateX(0);
      }
      ::selection {
        background: var(--accent);
        color: var(--accent-ink);
      }
      button,
      input,
      textarea {
        font-family: inherit;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(4px);
        }
      }
      .nav-link:hover {
        color: var(--text) !important;
      }
      /* Ambient background: very subtle bottom glow hinting scroll-down */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse 70% 32% at 50% 105%,
          var(--accent-glow),
          transparent 70%
        );
        opacity: 0.28;
        pointer-events: none;
        z-index: 0;
        transition: opacity 0.4s ease;
      }
      body.at-end::before {
        opacity: 0.08;
      }
      /* Scroll-hint at the bottom */
      .scroll-hint {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 2.5px;
        color: var(--text-muted);
        opacity: 0.85;
        transition: opacity 0.4s ease;
      }
      .scroll-hint.hidden {
        opacity: 0;
      }
      .scroll-hint .chev {
        width: 14px;
        height: 14px;
        border-right: 1.5px solid var(--accent);
        border-bottom: 1.5px solid var(--accent);
        transform: rotate(45deg);
        animation: chev 1.8s ease-in-out infinite;
        box-shadow: 2px 2px 8px var(--accent-glow);
      }
      @keyframes chev {
        0%,
        100% {
          transform: rotate(45deg) translate(-3px, -3px);
          opacity: 0.4;
        }
        50% {
          transform: rotate(45deg) translate(3px, 3px);
          opacity: 1;
        }
      }
      #root {
        position: relative;
        z-index: 1;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="portfolio-pages.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
        mode: "dark",
        btnStyle: "pill",
      }; /*EDITMODE-END*/

      const PAGE_ORDER = ["Home", "About", "Projects", "Skills", "Contact"];

      function App() {
        const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
        const [page, setPage] = useState("Home");
        const cooldown = React.useRef(false);

        useEffect(() => {
          applyTheme(tweaks.mode);
        }, [tweaks.mode]);

        // Dim the bottom glow when we're on the last page
        useEffect(() => {
          const last = page === PAGE_ORDER[PAGE_ORDER.length - 1];
          document.body.classList.toggle("at-end", last);
        }, [page]);

        // Wheel + keyboard nav between pages
        useEffect(() => {
          const go = (dir) => {
            if (cooldown.current) return;
            const idx = PAGE_ORDER.indexOf(page);
            const next = idx + dir;
            if (next < 0 || next >= PAGE_ORDER.length) return;
            cooldown.current = true;
            setPage(PAGE_ORDER[next]);
            setTimeout(() => {
              cooldown.current = false;
            }, 850);
          };
          const onWheel = (e) => {
            // let inputs / textareas scroll naturally
            if (
              e.target.closest &&
              e.target.closest("textarea, input, .tweaks-panel")
            )
              return;
            // let inner content scroll if not at boundary
            const sec = e.target.closest && e.target.closest("main > section");
            if (sec) {
              const atTop = sec.scrollTop <= 0;
              const atBottom =
                sec.scrollTop + sec.clientHeight >= sec.scrollHeight - 2;
              if (e.deltaY > 0 && !atBottom) return;
              if (e.deltaY < 0 && !atTop) return;
            }
            if (Math.abs(e.deltaY) < 8) return;
            go(e.deltaY > 0 ? 1 : -1);
          };
          const onKey = (e) => {
            if (e.target.matches && e.target.matches("textarea, input")) return;
            if (e.key === "ArrowDown" || e.key === "PageDown" || e.key === " ")
              go(1);
            if (e.key === "ArrowUp" || e.key === "PageUp") go(-1);
          };
          window.addEventListener("wheel", onWheel, { passive: true });
          window.addEventListener("keydown", onKey);
          return () => {
            window.removeEventListener("wheel", onWheel);
            window.removeEventListener("keydown", onKey);
          };
        }, [page]);

        // Touch swipe (mobile)
        useEffect(() => {
          let startY = null;
          const onStart = (e) => {
            startY = e.touches[0].clientY;
          };
          const onEnd = (e) => {
            if (startY == null) return;
            const dy = startY - e.changedTouches[0].clientY;
            if (Math.abs(dy) < 60 || cooldown.current) return;
            const idx = PAGE_ORDER.indexOf(page);
            const next = idx + (dy > 0 ? 1 : -1);
            if (next < 0 || next >= PAGE_ORDER.length) return;
            cooldown.current = true;
            setPage(PAGE_ORDER[next]);
            setTimeout(() => {
              cooldown.current = false;
            }, 850);
          };
          window.addEventListener("touchstart", onStart, { passive: true });
          window.addEventListener("touchend", onEnd, { passive: true });
          return () => {
            window.removeEventListener("touchstart", onStart);
            window.removeEventListener("touchend", onEnd);
          };
        }, [page]);

        const props = { onNav: setPage, btnStyle: tweaks.btnStyle };
        return (
          <>
            <Header active={page} onNav={setPage} btnStyle={tweaks.btnStyle} />
            <main key={page}>
              {page === "Home" && <PageHome {...props} />}
              {page === "About" && <PageAbout {...props} />}
              {page === "Projects" && <PageProjects {...props} />}
              {page === "Skills" && <PageSkills {...props} />}
              {page === "Contact" && <PageContact {...props} />}
            </main>

            <div className="page-dots">
              {PAGE_ORDER.map((p, i) => (
                <button
                  key={p}
                  className={"page-dot" + (page === p ? " active" : "")}
                  onClick={() => setPage(p)}
                  aria-label={p}
                >
                  <span className="label">{p}</span>
                </button>
              ))}
            </div>


            <TweaksPanel title="Tweaks">
              <TweakSection title="Theme">
                <TweakRadio
                  label="Mode"
                  value={tweaks.mode}
                  onChange={(v) => setTweak("mode", v)}
                  options={[
                    { value: "dark", label: "Dark" },
                    { value: "light", label: "Light" },
                  ]}
                />
              </TweakSection>
              <TweakSection title="Buttons">
                <TweakRadio
                  label="Style"
                  value={tweaks.btnStyle}
                  onChange={(v) => setTweak("btnStyle", v)}
                  options={[
                    { value: "clean", label: "Clean" },
                    { value: "pill", label: "Pill" },
                    { value: "sketch", label: "Sketch" },
                  ]}
                />
              </TweakSection>
            </TweaksPanel>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
